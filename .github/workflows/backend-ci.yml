name: Backend CI

on:
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  test:
    name: Run Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: transaction_user
          POSTGRES_PASSWORD: edrian
          POSTGRES_DB: transacscope_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U transaction_user -d transacscope_test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Set up test database
        env:
          PGPASSWORD: edrian
        run: |
          psql -h localhost -U transaction_user -d transacscope_test_db -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;"
          psql -h localhost -U transaction_user -d transacscope_test_db -f backend/migrations/001_create_tables.sql
          psql -h localhost -U transaction_user -d transacscope_test_db -c "INSERT INTO roles (name, description) VALUES ('admin', 'Full access'), ('standard', 'Limited access') ON CONFLICT DO NOTHING;"
          psql -h localhost -U transaction_user -d transacscope_test_db -c "INSERT INTO users (email, password_hash, role_id, first_name, last_name) VALUES ('super@admin.com', 'hashed', 1, 'Super', 'Admin');"
          psql -h localhost -U transaction_user -d transacscope_test_db -c "SELECT setval('users_id_seq', (SELECT MAX(id) FROM users));"

      - name: Run tests
        working-directory: backend
        env:
          DEBUG: "True"
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: transaction_user
          DB_PASSWORD: testpassword
          DB_NAME: transacscope_test_db
          ALLOWED_HOSTS: localhost,127.0.0.1,testserver,test
          ALLOWED_ORIGINS: http://localhost:5173
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
        run: pytest tests/ -v --tb=short